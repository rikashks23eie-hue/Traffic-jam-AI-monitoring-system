version: '3.8'

services:
  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic-violation-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - LOG_LEVEL=info
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - traffic-network

  # Frontend Web Server (Nginx)
  frontend:
    image: nginx:alpine
    container_name: traffic-violation-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - traffic-network

  # Database (Optional - MongoDB)
  # mongodb:
  #   image: mongo:latest
  #   container_name: traffic-violation-db
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=admin
  #     - MONGO_INITDB_ROOT_PASSWORD=password123
  #   volumes:
  #     - mongodb_data:/data/db
  #   restart: unless-stopped
  #   networks:
  #     - traffic-network

  # Cache (Optional - Redis)
  # redis:
  #   image: redis:alpine
  #   container_name: traffic-violation-cache
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
  #   networks:
  #     - traffic-network

networks:
  traffic-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local

# How to use:
# 1. Install Docker and Docker Compose
# 2. Run: docker-compose up -d
# 3. Backend available at: http://localhost:5000
# 4. Frontend available at: http://localhost
# 5. View logs: docker-compose logs -f
# 6. Stop: docker-compose down

# Build and push to Docker Hub:
# docker build -t username/traffic-violation-api:1.0 .
# docker push username/traffic-violation-api:1.0
